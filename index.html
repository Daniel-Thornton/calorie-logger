<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Logger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">

        <header>
            <div class="header-left">
                <img src="icons/logo.png" class="header-logo" alt="">
                <span class="header-title">Calorie Logger</span>
            </div>
            <div class="header-right">
                <button id="settings-btn" class="icon-btn" aria-label="Settings" title="Settings">
                    <img src="icons/settings.png" alt="Settings">
                </button>
            </div>
        </header>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Settings">
            <div class="modal-content">
                <div class="modal-titlebar">
                    <span class="modal-titlebar-title">Settings</span>
                    <button id="close-settings" class="modal-titlebar-close" aria-label="Close">&#x2715;</button>
                </div>
                <div class="modal-body">
                    <label for="tunnel-url">
                        Cloudflare Tunnel URL
                        <span class="label-hint">Paste the URL from your tunnel session at home</span>
                        <input type="url" id="tunnel-url" placeholder="https://xxxx-xxxx.trycloudflare.com" autocomplete="off" spellcheck="false">
                    </label>
                    <label for="model-name">
                        Ollama Model
                        <span class="label-hint">Must be pulled on your home PC</span>
                        <input type="text" id="model-name" placeholder="llama3.2" autocomplete="off" spellcheck="false">
                    </label>
                    <label for="target-kcal">
                        Daily Calorie Target
                        <span class="label-hint">Used to show your mood on the statistics page</span>
                        <input type="number" id="target-kcal" placeholder="2000" min="0" max="99999">
                    </label>
                    <div class="modal-actions">
                        <button id="save-settings" class="btn primary">Save</button>
                        <button id="cancel-settings" class="btn">Cancel</button>
                    </div>
                    <hr class="modal-divider">
                    <p class="modal-section-label">Data</p>
                    <div class="modal-actions">
                        <button id="download-log" class="btn full-width">Download log (JSON)</button>
                        <label class="btn full-width upload-label" for="upload-log">
                            Upload log (JSON)
                            <input type="file" id="upload-log" accept=".json" style="display:none">
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab navigation -->
        <nav class="tab-nav" role="tablist">
            <button class="tab-btn active" data-tab="today" role="tab" aria-selected="true">
                <img src="icons/calendar-5.png" alt="">
                Today
            </button>
            <button class="tab-btn" data-tab="stats" role="tab" aria-selected="false">
                <img src="icons/statistics.png" alt="">
                Statistics
            </button>
        </nav>

        <!-- ── TODAY TAB ── -->
        <div id="tab-today" class="tab-panel">

            <div class="date-bar">
                <span id="current-date"></span>
                <span id="total-calories" class="total-display">0 kcal</span>
            </div>

            <div id="streak-display"></div>

            <div id="error-banner" class="error-banner hidden"></div>

            <section class="input-section">
                <div class="voice-row">
                    <button id="voice-btn" class="voice-btn" aria-label="Record voice input" title="Record voice">
                        <img src="icons/microphone-0.png" alt="Record">
                    </button>
                    <span id="voice-status">Tap to speak</span>
                </div>
                <textarea id="meal-input" placeholder="Describe what you ate — e.g. two scrambled eggs, toast with butter, and a coffee with milk" rows="4" aria-label="Meal description"></textarea>
                <button id="log-btn" class="btn primary full-width">
                    <img src="icons/log_meal.png" alt="">
                    Log Meal
                </button>
            </section>

            <div id="loading" class="loading hidden" aria-live="polite">
                <div class="spinner"></div>
                <span>Estimating calories...</span>
            </div>

            <section class="log-section">
                <h2 class="section-label">Today's Log</h2>
                <div id="log-entries"></div>
            </section>

        </div>

        <!-- ── STATS TAB ── -->
        <div id="tab-stats" class="tab-panel hidden">
            <div id="stats-content"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
